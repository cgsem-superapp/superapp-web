name: Release Tracker

# Fires when a production tag vx.x.x is pushed.
# Trunk-based release flow:
#   main → stable/vx.x (staging) → tag vx.x.x (production)
#
# This workflow:
#   1. Creates a GitHub Release from the tag
#   2. Finds PRs merged to main since the last release tag
#   3. Labels their linked issues "released:vx.x.x" for traceability

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace("refs/tags/", "");

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              generate_release_notes: true,
              prerelease: false
            });

            console.log(`GitHub Release created for ${tag}`);

      - name: Label released issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const tag = context.ref.replace("refs/tags/", "");

            // Find previous release tag to scope the diff window
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              per_page: 10
            });

            const currentIdx = tags.findIndex(t => t.name === tag);
            const prevTag    = tags[currentIdx + 1]?.name ?? null;

            // Get PRs merged to main since prevTag (or all time if first release)
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: "closed",
              base:  "main",
              per_page: 100,
              sort: "updated",
              direction: "desc"
            });

            let prevDate = null;
            if (prevTag) {
              const prevCommit = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   `tags/${prevTag}`
              }).catch(() => null);

              if (prevCommit) {
                const { data: commit } = await github.rest.git.getCommit({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  commit_sha: prevCommit.data.object.sha
                });
                prevDate = new Date(commit.committer.date);
              }
            }

            const mergedPRs = prs.filter(pr =>
              pr.merged_at &&
              (!prevDate || new Date(pr.merged_at) > prevDate)
            );

            console.log(`Found ${mergedPRs.length} PRs merged since ${prevTag ?? "beginning"}`);

            // Ensure release label exists
            const labelName = `released:${tag}`;
            await github.rest.issues.createLabel({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              name:  labelName,
              color: "0075ca",
              description: `Shipped in ${tag}`
            }).catch(() => {});  // already exists

            // Parse linked issues from each PR body and label them
            const issuePattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const labelledIssues = new Set();

            for (const pr of mergedPRs) {
              const body = pr.body ?? "";
              const linked = [...body.matchAll(issuePattern)].map(m => parseInt(m[1]));

              for (const issueNumber of linked) {
                if (labelledIssues.has(issueNumber)) continue;
                try {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    issue_number: issueNumber,
                    labels: [labelName]
                  });
                  labelledIssues.add(issueNumber);
                  console.log(`Issue #${issueNumber} labelled ${labelName}`);
                } catch (err) {
                  console.warn(`Could not label #${issueNumber}: ${err.message}`);
                }
              }
            }

            console.log(`\nRelease ${tag}: ${labelledIssues.size} issue(s) marked as released`);
