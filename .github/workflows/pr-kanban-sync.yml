name: PR → Kanban Sync

# Trunk-based dev branch strategy:
#   main         = trunk (develop)
#   feat/*       = feature branches → PR into main
#   fix/*        = bugfix branches  → PR into main
#   chore/*      = chore branches   → PR into main
#   stable/vx.x  = staging promotion (main → stable/vx.x)
#   vx.x.x       = production release tag (handled in release-tracker.yml)

on:
  pull_request:
    types: [opened, ready_for_review, closed]
  pull_request_review:
    types: [submitted]

jobs:
  sync-kanban:
    runs-on: ubuntu-latest
    steps:
      - name: Sync PR status to Kanban board
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId   = "PVT_kwDOEb7Vgs4Bb62w";
            const statusField = "PVTSSF_lADOEb7Vgs4Bb62wzhWnlDI";

            const STATUS = {
              todo:       "5e0c780b",
              inProgress: "f68e32db",
              inReview:   "1569c34b",
              done:       "f264e7dc"
            };

            const pr     = context.payload.pull_request;
            const base   = pr?.base?.ref  ?? "";
            const head   = pr?.head?.ref  ?? "";
            const event  = context.eventName;
            const action = context.payload.action;

            // --- Determine which transition applies --------------------------

            let targetStatus = null;

            const isFeaturePR = base === "main" &&
              /^(feat|fix|chore|refactor|test|docs)\//.test(head);

            const isStagingPromotion = /^stable\/v\d+\.\d+$/.test(base) && base !== head;

            if (isFeaturePR) {
              if (event === "pull_request" && (action === "opened" || action === "ready_for_review")) {
                targetStatus = STATUS.inReview;
              } else if (event === "pull_request" && action === "closed" && pr?.merged) {
                // Merged into main → work is done
                targetStatus = STATUS.done;
              }
              // pull_request_review approved: do NOT move to done — PR is still open
            } else if (isStagingPromotion && event === "pull_request" && action === "opened") {
              // Staging promotion opened: label linked issues "staging" but don't change status
              // (issues are already Done; we just annotate for traceability)
              console.log(`Staging promotion PR detected (${head} → ${base}). Labelling linked issues.`);
              // Fall through to linked-issue loop below with targetStatus = null (label only)
            } else {
              console.log(`Skipping: not a tracked PR type (base=${base}, head=${head}, ${event}/${action})`);
              return;
            }

            // --- Parse linked issues from PR body ----------------------------
            const body = pr?.body ?? "";
            const linkedIssues = [...body.matchAll(/(?:closes?|fixes?|resolves?)\s+#(\d+)/gi)]
              .map(m => parseInt(m[1]));

            if (linkedIssues.length === 0) {
              console.log("No linked issues found in PR body (use 'closes #N')");
              return;
            }

            // --- Helper: find or add item in project -------------------------
            async function getOrAddBoardItem(issueNumber, issueNodeId) {
              const data = await github.graphql(`
                query($projectId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100) {
                        nodes { id content { ... on Issue { number } } }
                      }
                    }
                  }
                }
              `, { projectId });

              let item = data.node.items.nodes.find(i => i.content?.number === issueNumber);

              if (!item) {
                const added = await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId contentId: $contentId }) {
                      item { id }
                    }
                  }
                `, { projectId, contentId: issueNodeId });
                item = { id: added.addProjectV2ItemById.item.id };
              }

              return item;
            }

            // --- Update each linked issue ------------------------------------
            for (const issueNumber of linkedIssues) {
              try {
                const issueData = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });

                const item = await getOrAddBoardItem(issueNumber, issueData.data.node_id);

                if (isStagingPromotion) {
                  // Add "staging" label for traceability; don't change Kanban status
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    labels: ["staging"]
                  }).catch(() => {});  // label may not exist yet — silently skip
                  console.log(`Issue #${issueNumber} labelled staging`);
                  continue;
                }

                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item { id }
                    }
                  }
                `, {
                  projectId,
                  itemId: item.id,
                  fieldId: statusField,
                  optionId: targetStatus
                });

                const label = Object.keys(STATUS).find(k => STATUS[k] === targetStatus);
                console.log(`Issue #${issueNumber} → ${label}`);

              } catch (err) {
                console.error(`Failed on issue #${issueNumber}: ${err.message}`);
              }
            }
